<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My AI Agent</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">⚡</div>
    <div>
      <div class="header-title">My AI Agent</div>
      <div class="header-sub"><span class="status-dot"></span>llama-3.3-70b · groq</div>
    </div>
  </div>
  <button class="clear-btn" onclick="clearChat()">clear chat</button>
</header>

<div id="chat">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">🤖</div>
    <h2>My AI Agent</h2>
    <p>Powered by Llama 3.3 70B running on Groq. Ask me anything.</p>
    <div class="suggestions">
      <div class="suggestion" onclick="sendSuggestion(this)">What can you do?</div>
      <div class="suggestion" onclick="sendSuggestion(this)">Write a Python function</div>
      <div class="suggestion" onclick="sendSuggestion(this)">Explain AI agents</div>
      <div class="suggestion" onclick="sendSuggestion(this)">Tell me a joke</div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="user-input" placeholder="Ask anything..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <div class="input-hint">Enter to send · Shift+Enter for new line</div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
